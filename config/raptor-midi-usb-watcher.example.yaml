logging:
  level: info

scan:
  period_ms: 1000
  stable_cycles: 2

midi_io:
  config_path: /etc/raptor-midi-io-service/raptor-midi-io-service.yaml
  control_endpoint: ipc:///run/raptor-midi-io/control.zmq
  reload_command: reload-config

# Optional allowlist. If omitted or empty, watcher runs in auto-discovery mode
# and will mirror all detected ALSA input ports into usb_midi_controllers.
#controllers:
#  - id: x-touch-mini-a
#    match_name: X-TOUCH MINI